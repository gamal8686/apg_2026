name: company_apg_2026
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.11.1


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8

  flutter_svg: ^2.2.1
  pin_code_fields: ^8.0.1
  lottie: ^3.1.2
  clipboard: ^2.0.2
  flutter_screenutil: ^5.9.3
  animate_do: ^4.2.0
  dio: ^5.9.0
  google_maps_flutter: ^2.14.0
  shared_preferences: ^2.5.3
  carousel_slider: ^5.1.1
  shimmer: ^3.0.0
  flutter_bloc: ^9.1.1
  cached_network_image: ^3.4.1
  auto_size_text: ^3.0.0



dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/



  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/montserrat.ttf

    - family: MysteryQuest
      fonts:
        - asset: assets/fonts/MysteryQuest.ttf
    - family: Cairo
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf